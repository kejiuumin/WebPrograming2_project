# 애플리케이션 이름
spring.application.name=projectB

# Oracle 데이터베이스 연결 설정(@localhost:1521/xe로 써야함)
spring.datasource.url=jdbc:oracle:thin:@localhost:1521/FREEPDB1
spring.datasource.username=teamB
spring.datasource.password=teamB
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# JPA 설정
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Thymeleaf 설정
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# 파일 업로드 설정 (macOS용이므로 3번쨰줄 본인 경로로 수정)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.location=/Users/mof/Desktop/projectB/upload